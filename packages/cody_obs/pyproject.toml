[project]
name = "cody-obs"
version = "0.1.0"
description = "Thin client for the Cody observability collector."
requires-python = ">=3.10"
dependencies = ["httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cody_obs"]
